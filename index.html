<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Toggle</title>
    
    <style>
        /* Background Video Styling */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            animation: moveBackground 20s linear infinite; /* Smooth animation */
        }

        /* Background Animation */
        @keyframes moveBackground {
            0% {
                transform: scale(1) translateY(0);
            }
            50% {
                transform: scale(1.1) translateY(-10px); /* Slight zoom and upward shift */
            }
            100% {
                transform: scale(1) translateY(0);
            }
        }

        /* General Body Styling */
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            transition: background 0.5s, color 0.5s;
        }

        /* Toggle Button Styling */
        #themeToggle {
            font-size: 30px;
            cursor: pointer;
            border: none;
            background: none;
            outline: none;
            margin-top: 20px;
            position: relative;
            z-index: 1; /* Ensures button stays above the video */
        }
    </style>
</head>
<body>

    <!-- Background Video -->
    <video autoplay loop muted playsinline id="bg-video">
        <source src="Nebula video.mp4" type="video/mp4">
    </video>

    <!-- Content -->
    <h1>🌍 neb is live. You're invited</h1>
    <button id="themeToggle">🌙</button>

    <!-- JavaScript -->
    <script>
        const toggleBtn = document.getElementById("themeToggle");

        toggleBtn.addEventListener("click", () => {
            if (document.body.style.backgroundColor === "black") {
                document.body.style.backgroundColor = "white";
                document.body.style.color = "black";
                toggleBtn.textContent = "☀️";
            } else {
                document.body.style.backgroundColor = "black";
                document.body.style.color = "white";
                toggleBtn.textContent = "🌙";
            }
        });
    </script>

</body>
</html>
